<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Page Not Found | Wolvies Fitness</title>
<meta name="description" content="Page not found. Return to Wolvies Fitness homepage.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f5f5f5;font-family:'Barlow',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
.code{font-family:'Bebas Neue',sans-serif;font-size:12rem;line-height:1;color:rgba(200,16,46,.15);position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);user-select:none;pointer-events:none}
.content{position:relative;z-index:1}
.tag{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;letter-spacing:4px;text-transform:uppercase;color:#C8102E;margin-bottom:1rem}
h1{font-family:'Bebas Neue',sans-serif;font-size:4rem;letter-spacing:2px;margin-bottom:1rem}
p{color:#a0a0b0;font-size:.95rem;max-width:400px;line-height:1.8;margin-bottom:2rem}
.btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.btn-p{background:#C8102E;color:#fff;padding:.9rem 2rem;font-family:'Barlow Condensed',sans-serif;font-size:.9rem;letter-spacing:3px;text-transform:uppercase;text-decoration:none;transition:background .2s}
.btn-p:hover{background:#a00e24}
.btn-o{background:transparent;color:#f5f5f5;padding:.9rem 2rem;font-family:'Barlow Condensed',sans-serif;font-size:.9rem;letter-spacing:3px;text-transform:uppercase;text-decoration:none;border:1px solid #252525;transition:border-color .2s}
.btn-o:hover{border-color:#C8102E;color:#C8102E}
@media(max-width:480px){h1{font-size:2.5rem}.code{font-size:7rem}}
</style>
<meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta property="og:title" content="404 | Wolvies Fitness">
<link rel="canonical" href="https://wolve.in/404">
</head>
<body>
<div class="code">404</div>
<div class="content">
  <div class="tag">Error 404</div>
  <h1>PAGE NOT FOUND</h1>
  <p>The page you are looking for does not exist or has been moved. Head back and keep training.</p>
  <div class="btns">
    <a href="index.html" class="btn-p">Back to Home</a>
    <a href="shop.html" class="btn-o">Browse Programs</a>
  </div>
</div>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){});});
}
</script>
<script>function toggleMobileMenu(){}</script>
</body>
</html>
