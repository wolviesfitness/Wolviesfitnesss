<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<title>Page Not Found | Wolvies Fitness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f5f5f5;font-family:'Barlow',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;overflow:hidden}
.bg-num{font-family:'Bebas Neue',sans-serif;font-size:30vw;line-height:1;color:rgba(200,16,46,.07);position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);user-select:none;pointer-events:none;z-index:0}
.content{position:relative;z-index:1}
.tag{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;letter-spacing:4px;text-transform:uppercase;color:#C8102E;margin-bottom:1rem;display:block}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,8vw,5rem);letter-spacing:3px;margin-bottom:1rem;line-height:1}
p{color:#a0a0b0;font-size:.95rem;max-width:420px;line-height:1.8;margin:0 auto 2.5rem}
.btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.btn-p{background:#C8102E;color:#fff;padding:.9rem 2.2rem;font-family:'Barlow Condensed',sans-serif;font-size:.88rem;letter-spacing:3px;text-transform:uppercase;text-decoration:none;transition:background .2s;display:inline-block}
.btn-p:hover{background:#a00e24}
.btn-o{background:transparent;color:#f5f5f5;padding:.9rem 2.2rem;font-family:'Barlow Condensed',sans-serif;font-size:.88rem;letter-spacing:3px;text-transform:uppercase;text-decoration:none;border:1px solid #252525;transition:border-color .2s,color .2s;display:inline-block}
.btn-o:hover{border-color:#C8102E;color:#C8102E}
@media(max-width:480px){.btns{flex-direction:column;align-items:center}.btn-p,.btn-o{width:100%;max-width:260px;text-align:center}}
</style>
<meta name="description" content="Page not found. Return to Wolvies Fitness.">
<meta property="og:title" content="404 Not Found | Wolvies Fitness">
<link rel="canonical" href="https://wolve.in/404">
</head>
<body>
<div class="bg-num">404</div>
<div class="content">
  <span class="tag">Error 404</span>
  <h1>PAGE NOT<br>FOUND</h1>
  <p>The page you are looking for does not exist or has been moved. Head back and keep training.</p>
  <div class="btns">
    <a href="index.html" class="btn-p">Back to Home</a>
    <a href="shop.html" class="btn-o">Browse Programs</a>
  </div>
</div>
<script>
function toggleMobileMenu(){}
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});
}
</script>
</body>
</html>
